name: User Ban Unit Tests

on:
  push:
    branches: [ "G1JPW-36-As-an-Admin-I-want-to-ban-rule-breaking-users" ]
  pull_request:
    branches: [ "G1JPW-36-As-an-Admin-I-want-to-ban-rule-breaking-users" ]

jobs:
  phpunit-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Run PHPUnit tests
      run: php phpunit.phar --testdox UserBanTest.php

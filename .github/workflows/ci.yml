name: CI

on:
  push:
    branches: [ G1JPW-37-As-a-Job-Seeker-I-want-to-register-for-an-account-so-that-I-can-access-personalized-job-hunting-features ]
  pull_request:
    branches: [ G1JPW-37-As-a-Job-Seeker-I-want-to-register-for-an-account-so-that-I-can-access-personalized-job-hunting-features ]

jobs:
  python-tests-on-php:
    runs-on: ubuntu-latest

    env:
      REGISTER_URL: http://127.0.0.1:8000/register.php

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Prepare test data file
        run: |
          touch users.txt
          : > users.txt

      - name: Start PHP built-in server
        run: |
          php -S 127.0.0.1:8000 > php-server.log 2>&1 &
          sleep 3

      - name: Run unit tests
        run: |
          python -m unittest -v test_register.py

      - name: Show PHP server log if tests fail
        if: failure()
        run: cat php-server.log

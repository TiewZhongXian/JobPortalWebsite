<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Portal - Setup Profile</title>
    <style>
        :root {
            /* User-side Blue Theme */
            --primary: #2563eb; 
            --primary-hover: #1d4ed8;
            --bg-light: #f0f4f8; 
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-light); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            color: var(--text-dark);
            box-sizing: border-box;
        }

        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.05); 
            width: 100%;
            max-width: 500px; /* Slightly wider to accommodate side-by-side inputs */
            box-sizing: border-box;
        }

        .brand-logo {
            font-weight: 900;
            font-size: 20px;
            color: var(--primary);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
        }

        h2 { 
            margin-top: 0;
            margin-bottom: 5px; 
            font-size: 1.4rem;
            color: var(--text-dark);
            font-weight: 700;
            text-align: center;
        }

        p.subtitle { 
            text-align: center; 
            color: var(--text-muted); 
            font-size: 14px; 
            margin-bottom: 30px; 
        }

        .form-row { 
            display: flex; 
            gap: 15px; 
        }

        .form-group { 
            flex: 1; 
            margin-bottom: 20px;
        }

        .form-group-full {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-muted);
        }

        input, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            box-sizing: border-box; 
            transition: border-color 0.2s, box-shadow 0.2s;
            font-size: 15px;
            color: var(--text-dark);
            font-family: inherit;
        }

        input::placeholder, textarea::placeholder {
            color: #94a3b8;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: 600;
            margin-top: 10px;
            transition: background 0.2s;
        }

        button:hover { 
            background-color: var(--primary-hover); 
        }

    </style>
</head>
<body>

<div class="container" id="profile-container">
    <div class="brand-logo">Job Portal</div>
    <h2>Complete Your Profile</h2>
    <p class="subtitle">Add your details so employers can find you.</p>
    
    <form id="profileForm" onsubmit="return handleProfileSave(event)">
        <div class="form-row">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" placeholder="John" required>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" placeholder="Doe" required>
            </div>
        </div>

        <div class="form-group-full">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required>
        </div>
        
        <div class="form-group-full">
            <label for="bio">Professional Summary</label>
            <textarea id="bio" rows="4" placeholder="Briefly describe your skills, experience, and career goals..." required></textarea>
        </div>
        
        <button type="submit">Save Profile</button>
    </form>
</div>

<script>
    function handleProfileSave(event) {
        event.preventDefault(); // Prevents page reload
        
        let fName = document.getElementById('firstName').value;
        alert("Success! Profile saved for " + fName + ". Redirecting to your dashboard...");
        
        // Directing user to the dashboard we built earlier
        window.location.href = "dashboard.html";
    }
</script>

</body>
</html>

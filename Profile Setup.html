<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Profile Setup</title>
  <style>
    :root{--primary:#2563eb;--bg:#f0f4f8}
    body{font-family:system-ui,Segoe UI,Roboto,Arial;background:var(--bg);margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{background:#fff;padding:28px;border-radius:12px;box-shadow:0 8px 24px rgba(2,6,23,.06);width:100%;max-width:560px}
    .brand{color:var(--primary);font-weight:900;margin-bottom:8px}
    .form-row{display:flex;gap:12px}
    .form-group{flex:1}
    label{display:block;font-size:13px;color:#556677;margin-bottom:6px}
    input,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #e6eef6}
    button{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-weight:700;margin-top:10px}
    .topbar{display:flex;align-items:center;margin-bottom:12px}
  </style>
</head>
<body>
  <div class="card">
    <div class="topbar"><button onclick="history.back()" style="background:none;border:none;color:#6b7280;cursor:pointer">← Back</button><div style="flex:1"></div></div>
    <div class="brand">Job Portal</div>
    <h2 style="margin:0 0 8px">Complete Your Profile</h2>
    <p style="color:#6b7280;margin-top:0;margin-bottom:16px">Add your details so employers can find you.</p>

    <form id="profileForm">
      <div class="form-row">
        <div class="form-group"><label for="firstName">First Name</label><input id="firstName" required></div>
        <div class="form-group"><label for="lastName">Last Name</label><input id="lastName" required></div>
      </div>
      <div style="margin-top:12px"><label>Phone Number</label><input id="phone" required></div>
      <div style="margin-top:12px"><label>Professional Summary</label><textarea id="bio" rows="4" required></textarea></div>
      <button type="submit">Save Profile</button>
    </form>
  </div>

  <script>
    function getCurrent(){return JSON.parse(localStorage.getItem('currentUser')||'null')}
    function setCurrent(u){localStorage.setItem('currentUser', JSON.stringify(u));}
    function saveUserToStore(u){ const users = JSON.parse(localStorage.getItem('users')||'[]'); const idx = users.findIndex(x=>x.id===u.id); if(idx>=0) users[idx]=u; else users.push(u); localStorage.setItem('users', JSON.stringify(users)); }

    const user = getCurrent();
    if(!user){ alert('Not signed in. Redirecting to login.'); location.href='User Login.html'; }
    // prefill if profile exists
    if(user && user.profile){ document.getElementById('firstName').value = user.profile.firstName || ''; document.getElementById('lastName').value = user.profile.lastName || ''; document.getElementById('phone').value = user.profile.phone || ''; document.getElementById('bio').value = user.profile.bio || ''; }

    document.getElementById('profileForm').addEventListener('submit', function(e){
      e.preventDefault();
      const p = { firstName: document.getElementById('firstName').value.trim(), lastName: document.getElementById('lastName').value.trim(), phone: document.getElementById('phone').value.trim(), bio: document.getElementById('bio').value.trim() };
      user.profile = p; setCurrent(user); saveUserToStore(user);
      alert('Profile saved. Returning to feed.');
      location.href = 'Job Seeker Feed.html';
    });
  </script>
</body>
</html>

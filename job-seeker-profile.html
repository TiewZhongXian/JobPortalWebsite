<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Seeker Professional Profile</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; line-height: 1.6; }
        fieldset { margin-bottom: 20px; border: 1px solid #ccc; padding: 15px; }
        legend { font-weight: bold; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="file"], textarea { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        input[type="submit"] { padding: 10px 20px; font-size: 16px; background-color: #0056b3; color: white; border: none; cursor: pointer; }
        input[type="submit"]:hover { background-color: #004494; }
        .inline-field { display: inline-block; width: 48%; }
    </style>
</head>
<body>
    <h1>Build Your Professional Profile</h1>
    <p>Please fill out your details below so employers can evaluate your qualifications.</p>
    <form action="/submit-profile" method="POST" enctype="multipart/form-data">
        <fieldset>
            <legend>Basic Information</legend>
            <div class="inline-field">
                <label for="firstName">First Name *</label>
                <input type="text" id="firstName" name="firstName" required placeholder="Enter your first name">
            </div>
            <div class="inline-field">
                <label for="lastName">Last Name *</label>
                <input type="text" id="lastName" name="lastName" required placeholder="Enter your last name">
            </div>
            <label for="contactEmail">Contact Email *</label>
            <input type="email" id="contactEmail" name="contactEmail" required placeholder="example@email.com">
        </fieldset>

        <fieldset>
            <legend>Work Experience</legend>
            <p><em>Note: Add your most recent role below.</em></p>
            <label for="jobTitle">Job Title</label>
            <input type="text" id="jobTitle" name="jobTitle" placeholder="e.g., Software Engineer">
            <label for="companyName">Company Name</label>
            <input type="text" id="companyName" name="companyName" placeholder="e.g., Acme Corp">
            <div class="inline-field">
                <label for="startDate">Start Date</label>
                <input type="month" id="startDate" name="startDate">
            </div>
            <div class="inline-field">
                <label for="endDate">End Date</label>
                <input type="month" id="endDate" name="endDate">
            </div>
            <label style="font-weight: normal; margin-top: 5px;">
                <input type="checkbox" name="isCurrentRole" value="yes"> I currently work here (Present)
            </label>
        </fieldset>

        <fieldset>
            <legend>Education</legend>
            <label for="degree">Degree</label>
            <input type="text" id="degree" name="degree" placeholder="e.g., Bachelor of Science in Computer Science">
            <label for="institution">Institution Name</label>
            <input type="text" id="institution" name="institution" placeholder="e.g., University of Technology">
            <label for="gradYear">Year of Graduation</label>
            <input type="number" id="gradYear" name="gradYear" min="1950" max="2030" placeholder="YYYY">
        </fieldset>
    </form>
</body>
</html>

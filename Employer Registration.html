<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Portal - Employer Registration</title>
    <style>
        :root { --primary: #f59e0b; --primary-hover: #d97706; --bg-light: #f0f4f8; --text-dark: #1e293b; --text-muted: #64748b; --border-color: #cbd5e1; }
        body{font-family:'Segoe UI', Roboto, Arial, sans-serif;background:var(--bg-light);margin:0;display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text-dark)}
        .card{background:#fff;padding:32px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.06);max-width:420px;width:100%;}
        .brand{font-weight:900;color:var(--primary);font-size:20px;margin-bottom:8px}
        h2{margin:0 0 14px}
        .form-group{margin-bottom:12px;text-align:left}
        label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px}
        input{width:100%;padding:10px;border:1px solid var(--border-color);border-radius:8px}
        button{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer}
        .topbar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    </style>
</head>
<body>
  <div class="card">
    <div class="topbar"><button onclick="history.back()" style="background:transparent;border:none;color:var(--text-muted);cursor:pointer">← Back</button><div style="flex:1"></div></div>
    <div class="brand">Job Portal</div>
    <h2>Create company account</h2>

    <form id="employerForm">
      <div class="form-group"><label>Company Name</label><input id="companyName" required></div>
      <div class="form-group"><label>Work Email</label><input id="email" type="email" required></div>
      <div class="form-group"><label>Password</label><input id="password" type="password" required></div>
      <button type="submit">Get Started</button>
    </form>

    <p style="font-size:13px;color:var(--text-muted);margin-top:12px">Already have an account? <a href="User Login.html">Log in</a></p>
  </div>

  <script>
    function getUsers(){return JSON.parse(localStorage.getItem('users')||'[]')}
    function saveUsers(u){localStorage.setItem('users', JSON.stringify(u))}
    function setCurrent(u){localStorage.setItem('currentUser', JSON.stringify(u))}

    document.getElementById('employerForm').addEventListener('submit', function(e){
      e.preventDefault();
      const company = document.getElementById('companyName').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const pass = document.getElementById('password').value;
      const users = getUsers();
      if(users.find(x=>x.email===email)){ alert('An account with this email already exists. Please log in.'); location.href='User Login.html'; return }
      const user = { id: Date.now(), role: 'employer', email, password: pass, company };
      users.push(user); saveUsers(users);
      setCurrent(user);
      alert('Employer account created. You can post jobs now.');
      location.href = 'Create Job Posting Page.html';
    });
  </script>
</body>
</html>

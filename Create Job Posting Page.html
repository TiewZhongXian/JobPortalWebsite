<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employer - Post a Job</title>
    <style>
        :root {
            /* Employer-side Amber Theme */
            --primary: #f59e0b; 
            --primary-hover: #d97706;
            --bg-light: #f0f4f8; 
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-light); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            color: var(--text-dark);
            box-sizing: border-box;
        }

        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.05); 
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        .brand-logo {
            font-weight: 900;
            font-size: 20px;
            color: var(--primary);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
        }

        h2 { 
            margin-top: 0;
            margin-bottom: 5px; 
            font-size: 1.4rem;
            color: var(--text-dark);
            font-weight: 700;
            text-align: center;
        }

        p.subtitle { 
            text-align: center; 
            color: var(--text-muted); 
            font-size: 14px; 
            margin-bottom: 30px; 
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-muted);
        }

        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            box-sizing: border-box; 
            transition: border-color 0.2s, box-shadow 0.2s;
            font-size: 15px;
            color: var(--text-dark);
            font-family: inherit;
            background-color: white;
        }

        input::placeholder, textarea::placeholder {
            color: #94a3b8;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15); /* Amber glow */
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* Minor tweak for the select arrow spacing */
        select {
            cursor: pointer;
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: 600;
            margin-top: 10px;
            transition: background 0.2s;
        }

        button:hover { 
            background-color: var(--primary-hover); 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-logo">Job Portal</div>
    <h2>Post a New Job</h2>
    <p class="subtitle">Find the perfect candidate for your team.</p>
    
    <form onsubmit="return handleJobPost(event)">
        <div class="form-group">
            <label>Job Title</label>
            <input type="text" placeholder="e.g. Senior Software Engineer" required>
        </div>

        <div class="form-group">
            <label>Job Type</label>
            <select required>
                <option value="" disabled selected>Select Type...</option>
                <option value="full">Full-Time</option>
                <option value="part">Part-Time</option>
                <option value="contract">Contract</option>
                <option value="freelance">Freelance</option>
            </select>
        </div>

        <div class="form-group">
            <label>Job Description</label>
            <textarea placeholder="Describe the role, responsibilities, and requirements..." required></textarea>
        </div>

        <button type="submit">Publish Job</button>
    </form>
</div>

<script>
    function handleJobPost(event) {
        event.preventDefault();
        alert("Success! Your job has been published. Redirecting to your active listings...");
        
        // In a real app, you would redirect to the employer dashboard/listings page here
        window.location.href = "dashboard.html"; 
    }
</script>

</body>
</html>

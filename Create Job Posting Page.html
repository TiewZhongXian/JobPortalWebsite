<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create Job - Employer</title>
  <style>
    :root{--primary:#f59e0b;--bg:#f7fafc}
    body{font-family:system-ui,Segoe UI,Roboto,Arial;background:var(--bg);margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{background:#fff;padding:28px;border-radius:12px;box-shadow:0 8px 24px rgba(2,6,23,.06);width:100%;max-width:640px}
    .brand{color:var(--primary);font-weight:900;margin-bottom:8px}
    h2{margin:0 0 6px}
    .form-group{margin-bottom:12px;text-align:left}
    label{display:block;font-size:13px;color:#5b6b7a;margin-bottom:6px}
    input,select,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #e6eef6}
    textarea{min-height:110px}
    button{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-weight:700}
    .topbar{display:flex;align-items:center;margin-bottom:12px}
  </style>
</head>
<body>
  <div class="card">
    <div class="topbar"><button onclick="history.back()" style="background:none;border:none;color:#6b7280;cursor:pointer">← Back</button><div style="flex:1"></div><a href="Job Seeker Feed.html" style="font-size:13px;color:#475569;text-decoration:none">View Feed</a></div>
    <div class="brand">Job Portal</div>
    <h2>Post a New Job</h2>
    <p style="color:#6b7280;margin-top:0;margin-bottom:14px">Publish a job and it will appear in the job seeker feed.</p>

    <form id="jobForm">
      <div class="form-group"><label>Job Title</label><input id="title" required></div>
      <div class="form-group"><label>Job Type</label><select id="type" required><option value="full">Full-Time</option><option value="part">Part-Time</option><option value="contract">Contract</option><option value="freelance">Freelance</option></select></div>
      <div class="form-group"><label>Location</label><input id="location" placeholder="e.g. Remote or City, State"></div>
      <div class="form-group"><label>Job Description</label><textarea id="description" required></textarea></div>
      <button type="submit">Publish Job</button>
    </form>
  </div>

  <script>
    function getCurrent(){return JSON.parse(localStorage.getItem('currentUser')||'null')}
    function getJobs(){return JSON.parse(localStorage.getItem('jobs')||'[]')}
    function saveJobs(j){localStorage.setItem('jobs', JSON.stringify(j))}

    const user = getCurrent();
    if(!user || user.role!=='employer'){
      // not logged in as employer -> redirect to login
      // allow viewing feed if they want
      // location.href = 'User Login.html';
    }

    document.getElementById('jobForm').addEventListener('submit', function(e){
      e.preventDefault();
      const title = document.getElementById('title').value.trim();
      const type = document.getElementById('type').value;
      const desc = document.getElementById('description').value.trim();
      const location = document.getElementById('location').value.trim() || 'Remote';
      const jobs = getJobs();
      const job = { id: Date.now(), title, type, description: desc, location, company: (user&&user.company) || 'Employer', authorId: user?user.id:null, postedAt: new Date().toISOString() };
      jobs.push(job); saveJobs(jobs);
      alert('Job published. Returning to the job seeker feed.');
      location.href = 'Job Seeker Feed.html';
    });
  </script>
</body>
</html>

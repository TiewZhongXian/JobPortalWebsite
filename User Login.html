<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Portal - Login</title>
    <style>
        :root { --primary: #2563eb; --primary-hover: #1d4ed8; --bg-light: #f0f4f8; --text-dark: #1e293b; --text-muted: #64748b; --border-color: #cbd5e1; }
        body{font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;background:var(--bg-light);margin:0;display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text-dark)}
        .card{background:#fff;padding:32px;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.06);max-width:420px;width:100%;box-sizing:border-box}
        .brand{font-weight:900;color:var(--primary);font-size:20px;margin-bottom:8px}
        h2{margin:0 0 20px 0}
        .form-group{margin-bottom:14px;text-align:left}
        label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px}
        input{width:100%;padding:10px;border:1px solid var(--border-color);border-radius:8px;font-size:15px}
        button{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer}
        .row{display:flex;gap:8px;align-items:center;margin-top:12px}
        a.link{color:var(--primary);text-decoration:none}
        .topbar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
        .back{background:transparent;border:none;color:var(--text-muted);cursor:pointer}
    </style>
</head>
<body>
  <div class="card">
    <div class="topbar"><button class="back" onclick="history.back()">← Back</button><div style="flex:1"></div></div>
    <div class="brand">Job Portal</div>
    <h2>Sign in to your account</h2>

    <form id="loginForm">
      <div class="form-group"><label for="email">Email</label><input id="email" type="email" required></div>
      <div class="form-group"><label for="password">Password</label><input id="password" type="password" required></div>
      <button type="submit">Log in</button>
    </form>

    <div class="row">
      <div style="flex:1;font-size:13px;color:var(--text-muted)">No account? <a class="link" href="Job Seeker Registration.html">Seeker sign up</a> · <a class="link" href="Employer Registration.html">Employer sign up</a></div>
    </div>
  </div>

  <script>
    function getUsers(){return JSON.parse(localStorage.getItem('users')||'[]')}
    function setCurrent(user){localStorage.setItem('currentUser', JSON.stringify(user))}
    function findUser(email, pass){return getUsers().find(u=>u.email===email && u.password===pass)}

    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const pass = document.getElementById('password').value;
      const user = findUser(email, pass);
      if(!user){ alert('Invalid credentials.'); return }
      setCurrent(user);
      if(user.role === 'employer') location.href = 'Create Job Posting Page.html';
      else location.href = 'Job Seeker Feed.html';
    });
  </script>
</body>
</html>
